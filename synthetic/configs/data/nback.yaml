_target_: src.data.datamodule.DataModule

data_provider:
  _target_: src.data.data_provider.TokenClassificationFromFiles
  path: ${oc.env:DATA_PATH}/nback/n2_v16_tr-32-64_t-64-4096/


data_processor:
  _partial_: true
  _target_: src.data.data_processor.TokenClassificationProcessor


data_processor_kwargs:
  input_pattern: "{bos_token} {text} {eos_token}"
  target_pattern: "{no_loss} {text} {no_loss}"
  tokenizer:
    _target_: src.data.tokenizers.simple_tokenizer.SimpleTokenizer
    max_vocab_id: 15


data_loader_kwargs:
  num_workers: 4
  pin_memory: True


collator:
  _target_: src.data.collate.CollateTokenClassification
  _partial_: true
  tokenizer: ${..data_processor_kwargs.tokenizer}


batch_config:
  train:
    type: samples
    size: 128
  valid:
    type: samples
    size: 32
  test:
    type: samples
    size: 1

