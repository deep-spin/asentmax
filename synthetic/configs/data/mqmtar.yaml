_target_: src.data.datamodule.DataModule

data_provider:
  _target_: src.data.data_provider.SourceTargetFromFiles
  path: ${oc.env:DATA_PATH}/mqmtar/50M_abc-256_vocab-10K_kv-len-2_num_kv-80_num_q-4/

data_processor:
  _partial_: true
  _target_: src.data.data_processor.SourceTargetProcessor


data_processor_kwargs:
  src_pattern: "{bos_token} {text} {sep_token}"
  trg_pattern: "{text} {eos_token}"
  tokenizer:
    _target_: src.data.tokenizers.simple_tokenizer.SimpleTokenizer
    max_vocab_id: 259


data_loader_kwargs:
  num_workers: 4
  pin_memory: True


collator:
  _target_: src.data.collate.CollateSourceTarget
  _partial_: true
  tokenizer: ${..data_processor_kwargs.tokenizer}


batch_config:
  train:
    type: samples
    size: 128
    collator:
      right_pad: True
  valid:
    type: samples
    size: 16
    collator:
      right_pad: False
  test:
    type: samples
    size: 2
    collator:
      right_pad: False


